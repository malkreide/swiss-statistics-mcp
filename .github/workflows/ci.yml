name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          PYTHONPATH=src pytest tests/ -m "not live"

      - name: Lint
        run: ruff check src/ tests/

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          # Upgrade pip first so its own version is not flagged by pip-audit;
          # the host-tool's CVEs are not part of our supply chain.
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Static security scan (bandit)
        run: bandit -r src/ -ll

      - name: Dependency CVE scan (pip-audit)
        # `--strict` is intentionally NOT set: pip-audit's strict mode treats
        # the unaudit-able editable install of our own package as a hard
        # error, which makes the gate constantly red on any editable layout.
        # The default mode still exits 1 on real CVE findings in deps —
        # that is the gate we actually want.
        run: pip-audit
